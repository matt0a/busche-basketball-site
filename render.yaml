services:
  # Spring Boot Backend (Docker)
  - type: web
    name: busche-basketball-backend
    env: docker
    rootDir: basketball-backend
    plan: free
    envVars:
      # Populated automatically from the Render Postgres database below
      - key: DB_HOST
        fromDatabase:
          name: busche-basketball-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: busche-basketball-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: busche-basketball-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: busche-basketball-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: busche-basketball-db
          property: password
      # Activates application-prod.properties
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Auto-generated secure JWT secret
      - key: APP_JWT_SECRET
        generateValue: true
      # Set manually after frontend deploys (e.g. https://busche-basketball-frontend.onrender.com)
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      # AWS S3 — set manually in Render dashboard
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: APP_S3_BUCKET_NAME
        sync: false
      - key: APP_S3_REGION
        sync: false
      - key: APP_S3_PUBLIC_BASE_URL
        sync: false

  # React + Vite Frontend (Static Site)
  - type: web
    name: busche-basketball-frontend
    env: static
    rootDir: busche-basketball-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set manually to the backend service URL (e.g. https://busche-basketball-backend.onrender.com)
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: busche-basketball-db
    databaseName: busche_basketball
    user: busche_admin
    plan: free
